name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      # habitual_api is a separate public repo. We pull it in here so the
      # Playwright suite runs against the real API + Postgres, not a mock —
      # same stack as local dev, just composed at CI time instead of merging
      # the two repos.
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: Zhelero/habitual_api
          path: backend

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start backend + database
        run: docker compose -f backend/docker-compose.yml --profile app up -d --build db app

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker compose -f backend/docker-compose.yml logs app
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Backend logs (on failure)
        if: failure()
        run: docker compose -f backend/docker-compose.yml logs app db

      - name: Tear down backend
        if: always()
        run: docker compose -f backend/docker-compose.yml down -v