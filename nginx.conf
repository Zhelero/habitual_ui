server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # react-router uses client-side routing — unknown paths (e.g. /habits/5)
    # must still serve index.html, not a 404, so the SPA can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}